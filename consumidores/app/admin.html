<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AWS Explorer — LocalStack</title>
<style>
  :root{
    --bg:#0b0e14; --card:#11151f; --border:#1f2533;
    --text:#e6e8ee; --muted:#8b93a7;
    --green:#34d399; --red:#f87171;
    --mono:"SF Mono","Cascadia Code",Consolas,monospace;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:var(--mono); padding:28px; max-width:920px; margin:0 auto;
  }
  a{ color:var(--muted); text-decoration:none; font-size:12px; }
  a:hover{ color:var(--text); }
  h1{ font-size:19px; margin:0 0 4px; }
  .sub{ color:var(--muted); font-size:12px; margin-bottom:28px; }
  .topo{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
  .status{ font-size:11px; color:var(--muted); text-align:right; }
  .status .dot{
    display:inline-block; width:6px; height:6px; border-radius:50%;
    background:var(--green); margin-right:6px;
  }
  .status.erro .dot{ background:var(--red); }
  .secao{ margin-bottom:30px; }
  .secao h2{
    font-size:12px; color:var(--muted); text-transform:uppercase;
    letter-spacing:.06em; margin:0 0 10px;
  }
  table{
    width:100%; border-collapse:collapse; background:var(--card);
    border:1px solid var(--border); border-radius:10px; overflow:hidden;
  }
  th, td{ padding:11px 16px; text-align:left; font-size:13px; border-bottom:1px solid var(--border); }
  th{ color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase; }
  tr:last-child td{ border-bottom:none; }
  .badge{
    display:inline-block; min-width:22px; text-align:center; padding:3px 9px;
    border-radius:10px; font-size:12px; font-weight:700;
  }
  .badge.zero{ background:#1a2230; color:var(--muted); }
  .badge.ativo{ background:#103321; color:var(--green); }
  .badge.dlq{ background:#3a1620; color:var(--red); }
  .tag-dlq{
    font-size:10px; color:var(--red); border:1px solid #5c2630;
    padding:1px 6px; border-radius:8px; margin-left:8px;
  }
  .vazio{ color:var(--muted); font-size:13px; padding:20px; text-align:center; }
  .erro-linha{ color:var(--red); font-size:11px; }
  .rodape-erro{ color:var(--red); font-size:12px; margin-top:8px; }
</style>
</head>
<body>

  <div class="topo">
    <div>
      <h1>🔎 AWS Explorer</h1>
      <div class="sub">Filas SQS e bucket S3 do LocalStack — atualiza a cada 4s</div>
    </div>
    <div>
      <a href="/">&larr; voltar pra loja</a>
      <div class="status" id="status"><span class="dot"></span><span id="status-txt">conectando...</span></div>
    </div>
  </div>

  <div class="secao">
    <h2>Filas SQS</h2>
    <table id="tabela-filas">
      <thead><tr><th>Fila</th><th>Disponíveis</th><th>Em processamento</th></tr></thead>
      <tbody><tr><td colspan="3" class="vazio">Carregando...</td></tr></tbody>
    </table>
  </div>

  <div class="secao">
    <h2>Bucket S3 — Notas Fiscais</h2>
    <table id="tabela-s3">
      <thead><tr><th>Chave</th><th>Tamanho</th><th>Modificado em</th></tr></thead>
      <tbody><tr><td colspan="3" class="vazio">Carregando...</td></tr></tbody>
    </table>
    <div class="rodape-erro" id="erro-s3"></div>
  </div>

<script>
async function atualizar() {
  const statusEl = document.getElementById("status");
  const statusTxt = document.getElementById("status-txt");

  try {
    const filas = await (await fetch("/api/aws/filas")).json();
    renderFilas(filas);
    statusEl.classList.remove("erro");
    statusTxt.textContent = "conectado";
  } catch (e) {
    statusEl.classList.add("erro");
    statusTxt.textContent = "erro de conexão";
  }

  try {
    const s3 = await (await fetch("/api/aws/s3")).json();
    renderS3(s3);
  } catch (e) { /* tabela de S3 so fica sem atualizar */ }
}

function renderFilas(filas) {
  const tbody = document.querySelector("#tabela-filas tbody");
  if (!filas.length) {
    tbody.innerHTML = `<tr><td colspan="3" class="vazio">Nenhuma fila encontrada — rode o Terraform (scripts/start_all).</td></tr>`;
    return;
  }
  tbody.innerHTML = filas.map((f) => {
    const cls = f.erro ? "zero" : (f.e_dlq ? (f.mensagens_disponiveis > 0 ? "dlq" : "zero")
                                            : (f.mensagens_disponiveis > 0 ? "ativo" : "zero"));
    const tagDlq = f.e_dlq ? `<span class="tag-dlq">DLQ</span>` : "";
    const linhaErro = f.erro ? `<div class="erro-linha">${esc(f.erro)}</div>` : "";
    return `<tr>
      <td>${esc(f.nome)}${tagDlq}${linhaErro}</td>
      <td><span class="badge ${cls}">${f.mensagens_disponiveis}</span></td>
      <td>${f.mensagens_em_processamento}</td>
    </tr>`;
  }).join("");
}

function renderS3(s3) {
  const tbody = document.querySelector("#tabela-s3 tbody");
  const erroEl = document.getElementById("erro-s3");
  erroEl.textContent = s3.erro ? `Bucket "${s3.bucket}": ${s3.erro}` : "";

  if (!s3.objetos.length) {
    tbody.innerHTML = `<tr><td colspan="3" class="vazio">Nenhum objeto ainda — finalize um pedido para gerar uma NF-e.</td></tr>`;
    return;
  }
  tbody.innerHTML = s3.objetos.map((o) => `<tr>
      <td>${esc(o.chave)}</td>
      <td>${o.tamanho_bytes} bytes</td>
      <td>${new Date(o.modificado_em).toLocaleString("pt-BR")}</td>
    </tr>`).join("");
}

function esc(str) {
  return String(str ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

atualizar();
setInterval(atualizar, 4000);
</script>
</body>
</html>
